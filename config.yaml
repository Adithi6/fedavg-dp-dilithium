experiment:
  n_clients: 5
  n_rounds: 3
  local_epochs: 1

gossip:
  fanout: 2
  max_hops: 3

security:
  use_hash: true
  hash_algorithm: sha256

crypto:
  scheme: dilithium2

logging:
  log_file: experiment.log
  log_level: INFO

training:
  learning_rate: 0.001

model:
  name: smallcnn
  input_channels: 1
  input_height: 28
  input_width: 28
  conv1_channels: 16
  conv2_channels: 32
  hidden_dim: 128
  num_classes: 10

data:
  dataset_name: ylecun/mnist
  batch_size: 32
  test_batch_size: 256
  alpha: 0.5
  partition_by: label
  min_partition_size: 10
  self_balancing: true
  seed: 42
  normalize_mean: [0.1307]
  normalize_std: [0.3081]

weights:
  dtype: float32